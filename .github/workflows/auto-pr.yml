name: Auto PR + Auto Merge

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR
        id: pr
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "${{ github.ref_name }}" \
            --title "Auto PR - ${{ github.ref_name }}" \
            --body "🚀 Auto PR created" || echo "")

          if [ -z "$PR_URL" ]; then
            PR_NUMBER=$(gh pr list \
              --head "${{ github.ref_name }}" \
              --base main \
              --json number \
              -q '.[0].number')
          else
            PR_NUMBER=$(echo $PR_URL | grep -oE '[0-9]+$')
          fi

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ SAFE AUTO MERGE (waits for checks)
      - name: Enable Auto Merge
        if: steps.pr.outputs.pr_number != ''
        run: |
          gh pr merge ${{ steps.pr.outputs.pr_number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}