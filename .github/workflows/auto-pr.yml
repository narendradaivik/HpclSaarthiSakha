name: Auto Create PR + Notify

on:
  push:
    branches-ignore:
      - main

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout FULL history (IMPORTANT FIX)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ✅ VERY IMPORTANT

      # 2. Create PR (FOR CURRENT BRANCH)
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Auto PR commit"
          title: "Auto PR - ${{ github.ref_name }}"
          body: |
            🚀 Auto PR created

            Author: ${{ github.actor }}
            Branch: ${{ github.ref_name }}

            👀 Reviewer: @prabhaardwi

          base: main
          branch: ${{ github.ref_name }}   # ✅ FIXED
          reviewers: prabhaardwi

      # 3. Get PR Number (ROBUST WAY)
      - name: Get PR Number
        id: pr
        run: |
          PR_NUMBER=$(gh pr list \
            --head "${{ github.ref_name }}" \
            --base main \
            --json number \
            -q '.[0].number')

          echo "PR Number = $PR_NUMBER"

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. Enable Auto Merge (FIXED)
      - name: Enable Auto Merge
        if: steps.pr.outputs.pr_number != ''
        run: |
          gh pr merge ${{ steps.pr.outputs.pr_number }} \
            --squash \
            --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. Notify Teams 🚀
      - name: Notify Teams
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"text\": \"🚀 PR Update!\\n\\n📦 Repo: ${{ github.repository }}\\n🌿 Branch: ${{ github.ref_name }}\\n👤 Author: ${{ github.actor }}\\n\\n🔗 PR Link:\\nhttps://github.com/${{ github.repository }}/pull/${{ steps.pr.outputs.pr_number }}\"
          }" \
          ${{ secrets.TEAMS_WEBHOOK_URL }}

      # 6. Send Email 📧
      - name: Send Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚀 PR Created / Updated"
          body: |
            PR created or updated.

            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}

            Link:
            https://github.com/${{ github.repository }}/pull/${{ steps.pr.outputs.pr_number }}

          to: narendra.singh@commdel.net
          from: ${{ secrets.EMAIL_USERNAME }}