name: Auto Create PR + Notify

on:
  push:
    branches-ignore:
      - main

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Create Pull Request
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Auto PR - ${{ github.ref_name }}"
          body: |
            🚀 Auto PR created

            Author: ${{ github.actor }}
            Branch: ${{ github.ref_name }}

            👀 Reviewer: @prabhaardwi

          base: main
          reviewers: prabhaardwi

      # 3. Debug PR Number (VERY IMPORTANT)
      - name: Debug PR Number
        run: echo "PR Number = ${{ steps.cpr.outputs.pull-request-number }}"

      # 4. Set PR Number (handle empty case)
      - name: Set PR Number
        id: pr
        run: |
          if [ -z "${{ steps.cpr.outputs.pull-request-number }}" ]; then
            echo "PR not created, trying to fetch existing PR..."

            PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number -q '.[0].number')
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ steps.cpr.outputs.pull-request-number }}" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. Enable Auto Merge
      - name: Enable Auto Merge
        if: steps.pr.outputs.pr_number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.pr.outputs.pr_number }}
          merge-method: squash

      # 6. Notify Teams 🚀
      - name: Notify Teams
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"text\": \"🚀 Pull Request Update!\\n\\n📦 Repo: ${{ github.repository }}\\n🌿 Branch: ${{ github.ref_name }}\\n👤 Author: ${{ github.actor }}\\n\\n🔗 PR Link:\\nhttps://github.com/${{ github.repository }}/pull/${{ steps.pr.outputs.pr_number }}\"
          }" \
          ${{ secrets.TEAMS_WEBHOOK_URL }}

      # 7. Send Email via Gmail 📧
      - name: Send Email (Gmail)
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚀 PR Created / Updated - Action Required"
          body: |
            A Pull Request has been created or updated.

            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Author: ${{ github.actor }}

            Review here:
            https://github.com/${{ github.repository }}/pull/${{ steps.pr.outputs.pr_number }}

          to: narendra.singh@commdel.net
          from: ${{ secrets.EMAIL_USERNAME }}