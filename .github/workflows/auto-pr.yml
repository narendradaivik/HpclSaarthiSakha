name: Auto PR + Auto Merge

on:
  push:
    branches-ignore:
      - main
      - dev
      - uat

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR to dev
        id: pr
        run: |
          PR_URL=$(gh pr create \
            --base dev \
            --head "${{ github.ref_name }}" \
            --title "Auto PR - ${{ github.ref_name }}" \
            --body "🚀 Auto PR created. Waiting for checks and reviewer approval." \
            --reviewer nnarrendra || echo "")

          if [ -z "$PR_URL" ]; then
            PR_NUMBER=$(gh pr list \
              --head "${{ github.ref_name }}" \
              --base dev \
              --json number \
              -q '.[0].number')
            if [ -n "$PR_NUMBER" ]; then
              gh pr edit $PR_NUMBER --add-reviewer nnarrendra || true
            fi
          else
            PR_NUMBER=$(echo $PR_URL | grep -oE '[0-9]+$')
          fi

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Enable Auto Merge
        if: steps.pr.outputs.pr_number != ''
        run: |
          gh pr merge ${{ steps.pr.outputs.pr_number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
