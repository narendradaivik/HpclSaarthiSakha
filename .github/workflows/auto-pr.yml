name: Auto Create PR + Notify

on:
  push:
    branches-ignore:
      - main

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Create Pull Request
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Auto PR - ${{ github.ref_name }}"
          body: |
            🚀 Auto PR created

            Author: ${{ github.actor }}
            Branch: ${{ github.ref_name }}

            👀 Reviewer: @prabhaardwi

          base: main
          reviewers: prabhaardwi

      # 3. Enable Auto Merge
      - name: Enable Auto Merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

      # 4. Notify Teams 🚀
      - name: Notify Teams
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"text\": \"🚀 New Pull Request Created!\\n\\n📦 Repo: ${{ github.repository }}\\n🌿 Branch: ${{ github.ref_name }}\\n👤 Author: ${{ github.actor }}\\n\\n🔗 PR Link:\\nhttps://github.com/${{ github.repository }}/pull/${{ steps.cpr.outputs.pull-request-number }}\"
          }" \
          ${{ secrets.TEAMS_WEBHOOK_URL }}

      # 5. Send Email via Gmail 📧
      - name: Send Email (Gmail)
        if: steps.cpr.outputs.pull-request-number != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚀 New PR Created - Action Required"
          body: |
            A new Pull Request has been created.

            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Author: ${{ github.actor }}

            Review here:
            https://github.com/${{ github.repository }}/pull/${{ steps.cpr.outputs.pull-request-number }}

          to: narendra.singh@commdel.net
          from: ${{ secrets.EMAIL_USERNAME }}