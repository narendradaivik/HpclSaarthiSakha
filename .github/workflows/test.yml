name: Flutter Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:   # 👈 IMPORTANT (adds manual trigger)

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test