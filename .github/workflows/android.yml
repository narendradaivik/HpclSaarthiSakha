name: Flutter Release APK

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout
    - uses: actions/checkout@v4

    # 2. Setup Java
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Setup Flutter
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'

    # 4. Decode Keystore
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks

    # 5. Install deps
    - name: Install dependencies
      run: flutter pub get

    # 6. Get version from pubspec.yaml
    - name: Extract version
      id: version
      run: |
        VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    # 7. Build SIGNED APK ✅ (FIX HERE)
    - name: Build Release APK
      run: flutter build apk --release
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    # 8. Rename APK
    - name: Rename APK
      run: mv build/app/outputs/flutter-apk/app-release.apk app-${{ steps.version.outputs.version }}.apk

    # 9. Generate Release Notes
    - name: Generate Notes
      run: |
        echo "🚀 Release ${{ steps.version.outputs.version }}" > notes.txt
        echo "" >> notes.txt
        git log -5 --pretty=format:"- %s" >> notes.txt

    # 10. Create GitHub Release
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release v${{ steps.version.outputs.version }}
        body_path: notes.txt
        files: app-${{ steps.version.outputs.version }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}