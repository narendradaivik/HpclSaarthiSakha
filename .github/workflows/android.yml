name: Flutter Release APK

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:

  # в”Ђв”Ђв”Ђ JOB 1: Pehle version bump karo в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  bump-version:
    name: Version Bump
    runs-on: ubuntu-latest

    outputs:
      new_version: ${{ steps.new.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Detect bump type from branch name
        id: bump
        run: |
          MERGED_BRANCH=$(git log -1 --merges --pretty=format:"%s" | grep -oE '(feature|fix|hotfix|chore|release)/[^ ]+' | head -1)
          echo "Merged branch: $MERGED_BRANCH"

          if echo "$MERGED_BRANCH" | grep -qE '^release/'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MERGED_BRANCH" | grep -qE '^feature/'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Read current version
        id: current
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}')
          SEMVER=$(echo $VERSION | cut -d'+' -f1)
          BUILD=$(echo $VERSION | cut -d'+' -f2)
          MAJOR=$(echo $SEMVER | cut -d'.' -f1)
          MINOR=$(echo $SEMVER | cut -d'.' -f2)
          PATCH=$(echo $SEMVER | cut -d'.' -f3)
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Calculate new version
        id: new
        run: |
          MAJOR=${{ steps.current.outputs.major }}
          MINOR=${{ steps.current.outputs.minor }}
          PATCH=${{ steps.current.outputs.patch }}
          BUILD=${{ steps.current.outputs.build }}
          TYPE=${{ steps.bump.outputs.type }}
          NEW_BUILD=$((BUILD + 1))

          if [ "$TYPE" = "major" ]; then
            NEW_VERSION="$((MAJOR + 1)).0.0+$NEW_BUILD"
          elif [ "$TYPE" = "minor" ]; then
            NEW_VERSION="${MAJOR}.$((MINOR + 1)).0+$NEW_BUILD"
          else
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))+$NEW_BUILD"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION (type: $TYPE)"

      - name: Update pubspec.yaml
        run: |
          OLD=$(grep 'version:' pubspec.yaml | awk '{print $2}')
          NEW=${{ steps.new.outputs.version }}
          sed -i "s/version: $OLD/version: $NEW/" pubspec.yaml
          echo "Updated: $OLD в†’ $NEW"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.new.outputs.version }} [skip ci]"
          git push

  # в”Ђв”Ђв”Ђ JOB 2: Version bump hone KE BAAD build karo в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    needs: bump-version

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: main

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache Flutter
      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      # 4. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'

      - name: Install dependencies
        run: flutter pub get

      # 6. Create local.properties
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      # 7. Decode Keystore
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks

      # 8. Extract version (strips +1 build number so tag is valid)
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # 9. Build Signed APK
      - name: Build Release APK
        run: flutter build apk --release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 10. Rename APK
      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk app-${{ steps.version.outputs.version }}.apk

      - name: Generate Notes
        run: |
          echo "рџљЂ Release ${{ steps.version.outputs.version }}" > notes.txt
          echo "" >> notes.txt
          git log -5 --pretty=format:"- %s" >> notes.txt

      - name: Delete existing release if present
        run: gh release delete v${{ steps.version.outputs.version }} --yes --cleanup-tag 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: notes.txt
          files: app-${{ steps.version.outputs.version }}.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Teams (Success)
        if: success()
        run: |
          NOTES=$(cat notes.txt | sed ':a;N;$!ba;s/\n/\\n/g')
          curl -H "Content-Type: application/json" \
          -d "{
            \"text\": \"рџљЂ SAARTHI SAKHA APP Released Successfully!\n\nрџ“¦ Repo: ${{ github.repository }}\nрџЊї Branch: main\nрџ‘¤ By: ${{ github.actor }}\nрџ”– Version: ${{ steps.version.outputs.version }}\n\nрџ“ќ Release Notes:\n$NOTES\n\nв¬‡пёЏ Download APK:\nhttps://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}\"
          }" \
          ${{ secrets.TEAMS_WEBHOOK_URL }}

      - name: Notify Teams (Failure)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"text\": \"вќЊ Build Failed!\n\nрџ“¦ Repo: ${{ github.repository }}\nрџ‘¤ By: ${{ github.actor }}\n\nрџ”Ќ Logs:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          ${{ secrets.TEAMS_WEBHOOK_URL }}

      - name: Send Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "рџљЂ SAARTHI SAKHA APP Released v${{ steps.version.outputs.version }}"
          body: |
            SAARTHI SAKHA APP Released Successfully!

            Repo: ${{ github.repository }}
            Version: ${{ steps.version.outputs.version }}

            Download APK:
            https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}
          to: prabhakar.dwivedi@commdel.net
          from: ${{ secrets.EMAIL_USERNAME }}