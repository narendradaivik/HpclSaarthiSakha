name: Flutter Release APK

permissions:
  contents: write

on:
  pull_request:
    branches:
      - main
    

jobs:
  build:
   
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Setup Flutter
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'

        

    # 4. Decode Keystore
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks

    # 5. Install dependencies
    - name: Install dependencies
      run: flutter pub get

    # 6. Extract version
    - name: Extract version
      id: version
      run: |
        VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    # 7. Build Signed APK
    - name: Build Release APK
      run: flutter build apk --release
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    # 8. Rename APK
    - name: Rename APK
      run: mv build/app/outputs/flutter-apk/app-release.apk app-${{ steps.version.outputs.version }}.apk

    # 9. Generate Release Notes
    - name: Generate Notes
      run: |
        echo "đźš€ Release ${{ steps.version.outputs.version }}" > notes.txt
        echo "" >> notes.txt
        git log -5 --pretty=format:"- %s" >> notes.txt

    # 10. Create GitHub Release
    - name: Create GitHub Release
      id: release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release v${{ steps.version.outputs.version }}
        body_path: notes.txt
        files: app-${{ steps.version.outputs.version }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 11. Notify Teams (Success)
    - name: Notify Teams (Success)
      if: success()
      run: |
        NOTES=$(cat notes.txt | sed ':a;N;$!ba;s/\n/\\n/g')

        curl -H "Content-Type: application/json" \
        -d "{
          \"text\": \"đźš€ SAARTHI SAKHA APP Released Successfully!\\n\\nđź“¦ Repo: ${{ github.repository }}\\nđźŚż Branch: main\\nđź‘¤ By: ${{ github.actor }}\\nđź”– Version: ${{ steps.version.outputs.version }}\\n\\nđź“ť Release Notes:\\n$NOTES\\n\\nâ¬‡ď¸Ź Download APK:\\nhttps://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}\"
        }" \
        ${{ secrets.TEAMS_WEBHOOK_URL }}

    # 12. Notify Teams (Failure)
    - name: Notify Teams (Failure)
      if: failure()
      run: |
        curl -H "Content-Type: application/json" \
        -d "{
          \"text\": \"âťŚ Build Failed!\\n\\nđź“¦ Repo: ${{ github.repository }}\\nđź‘¤ By: ${{ github.actor }}\\n\\nđź”Ť Logs:\\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
        }" \
        ${{ secrets.TEAMS_WEBHOOK_URL }}

    # 13. Send Email via Outlook
    - name: Send Email (Outlook)
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        secure: false
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "đźš€ SAARTHI SAKHA APP Released v${{ steps.version.outputs.version }}"
        body: |
          SAARTHI SAKHA APP Released Successfully!

          Repo: ${{ github.repository }}
          Version: ${{ steps.version.outputs.version }}

          Download APK:
          https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}

        to: prabhakar.dwivedi@commdel.net
        from: ${{ secrets.EMAIL_USERNAME }}